<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Subtitle Generator | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Subtitle Generator",
    "url": "https://subtitlegenerator.quickutils.top/",
    "description": "Real-time speech-to-text subtitle creation using browser",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://subtitlegenerator.quickutils.top/">
    <meta name="keywords" content="QuickUtils, subtitle, generator, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Subtitle Generator | QuickUtils">
    <meta property="og:description" content="Real-time speech-to-text subtitle creation using browser's Web Speech API. Export as .SRT files.">
    <meta property="og:url" content="https://quickutils.top/subtitle-generator/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Real-time speech-to-text subtitle creation using browser's Web Speech API. Export as .SRT files.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
    <link rel="stylesheet" href="quickutils-core.css">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body class="grid-bg">
    <nav class="navbar glass-nav"><div class="container nav-inner">
        <a href="https://quickutils.top" class="brand holo-text">🎤 Subtitle Generator</a>
        <div class="nav-links">
            <a href="https://ko-fi.com/dayatin" target="_blank" class="kofi-link">☕ Support</a>
            <button id="themeBtn" class="theme-btn">🌙</button>
        </div>
    </div></nav>
    <main class="container py-4">
        <div class="hero-section text-center mb-4"><h1 class="gradient-text">AI Subtitle Generator</h1><p class="text-muted">Speak and get subtitles instantly — multi-format export with inline editing</p></div>
    <div class="glass-card p-4 text-center">
        <button id="recordBtn" class="btn btn-primary" style="font-size:1.5rem;padding:15px 40px;border-radius:50px;transition:all 0.3s;">🎙️ Start Recording</button>
        <div id="interimText" style="margin-top:0.75rem;color:#a78bfa;font-style:italic;min-height:1.5em;opacity:0;transition:opacity 0.3s;"></div>
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:1rem;">
            <select id="langRec" class="form-control" style="max-width:180px;padding:8px;background:rgba(0,0,0,0.2);color:inherit;border:1px solid rgba(255,255,255,0.15);border-radius:8px;">
                <option value="en-US">🇺🇸 English (US)</option><option value="en-GB">🇬🇧 English (UK)</option>
                <option value="es-ES">🇪🇸 Spanish</option><option value="fr-FR">🇫🇷 French</option>
                <option value="de-DE">🇩🇪 German</option><option value="it-IT">🇮🇹 Italian</option>
                <option value="pt-BR">🇧🇷 Portuguese</option><option value="ja-JP">🇯🇵 Japanese</option>
                <option value="ko-KR">🇰🇷 Korean</option><option value="zh-CN">🇨🇳 Chinese</option>
                <option value="hi-IN">🇮🇳 Hindi</option><option value="ar-SA">🇸🇦 Arabic</option>
                <option value="ru-RU">🇷🇺 Russian</option><option value="nl-NL">🇳🇱 Dutch</option>
            </select>
            <button class="btn btn-secondary" id="importBtn" title="Import .SRT file">📂 Import</button>
            <label class="btn btn-secondary" style="cursor:pointer;margin:0;" title="Load video for sync">🎬 Video <input type="file" id="videoUpload" accept="video/*" style="display:none;"></label>
            <label class="btn btn-primary" style="cursor:pointer;margin:0;" title="Upload Audio File for Transcription" id="audioUploadLbl">🎵 Generate from Audio <input type="file" id="audioUpload" accept="audio/*" style="display:none;"></label>
            <button class="btn btn-secondary" id="clearBtn">🗑️ Clear</button>
        </div>
        <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-top:0.75rem;">
            <span style="font-size:0.75rem;color:var(--text-muted);align-self:center;">Export as:</span>
            <button class="btn btn-primary btn-sm" id="exportBtn">⬇️ .SRT</button>
            <button class="btn btn-secondary btn-sm" id="exportVTTBtn">📝 .VTT</button>
            <button class="btn btn-secondary btn-sm" id="exportASSBtn">🎭 .ASS</button>
            <button class="btn btn-secondary btn-sm" id="exportJSONBtn">{ } JSON</button>
            <button class="btn btn-secondary btn-sm" id="exportTXTBtn">📄 .TXT</button>
        </div>
    </div>
    <div id="subStats" style="text-align:center;padding:0.5rem;font-size:0.8rem;color:var(--text-muted);display:flex;gap:0.75rem;justify-content:center;margin-top:0.5rem;"></div>
    <div id="videoContainer" class="mt-3"></div>
    <div class="glass-card p-4 mt-3" id="transcriptLog" style="min-height:200px;max-height:500px;overflow-y:auto;font-family:'Fira Code',monospace;font-size:0.85rem;background:rgba(0,0,0,0.3);border-radius:12px;"></div>
    <div style="text-align:center;margin-top:0.5rem;font-size:0.7rem;color:var(--text-muted);">⌨️ Ctrl+R to record · Ctrl+S to save · Click subtitle to jump video · ✏️ Edit · ✂️ Split · 🔗 Merge</div>
    </main>
    <footer class="footer"><div class="container copyright text-center py-4">© 2026 QuickUtils. All rights reserved.</div></footer>
    <script src="quickutils-core.js"></script>

</body>
</html>
